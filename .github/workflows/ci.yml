name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # Skip CI on release commits — the release workflow handles those
    if: "!startsWith(github.event.head_commit.message, 'release: v')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Verify CLI output
        run: |
          node dist/cli.js --output /tmp/sri-yantra.svg
          test -s /tmp/sri-yantra.svg || (echo "CLI produced empty output" && exit 1)
          node dist/cli.js --minimal --output /tmp/minimal.svg
          test -s /tmp/minimal.svg || (echo "Minimal CLI produced empty output" && exit 1)
          node dist/cli.js --animated draw --output /tmp/animated.svg
          test -s /tmp/animated.svg || (echo "Animated CLI produced empty output" && exit 1)
          echo "✓ All CLI outputs verified"
