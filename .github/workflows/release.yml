name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Verify CLI
        run: |
          node dist/cli.js --output /tmp/test.svg
          test -s /tmp/test.svg || (echo "CLI produced empty output" && exit 1)
          node dist/cli.js --minimal --output /tmp/test-min.svg
          test -s /tmp/test-min.svg || (echo "Minimal CLI produced empty output" && exit 1)
          echo "✓ CLI generates valid SVGs"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
